[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Parser            docker
    Tag               docker.*
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  2

[FILTER]
    Name    grep
    Match   docker.*
    Regex   log .*\"event\":\"sip_(invite|answer|bye)\"

[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       sipjson
    Reserve_Data Off

[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                opensearch-node1
    Port                9200
    HTTP_User           admin
    HTTP_Passwd         ${OPENSEARCH_PASSWORD}
    Index               sip-calls
    Logstash_Format     On
    Suppress_Type_Name  On
    tls                 On
    tls.verify          Off