---
version: "3.9"
services:

  sngrep:
    build:
      context: ./sngrep
      dockerfile: Dockerfile
    container_name: sngrep
    privileged: true  
    network_mode: host 
    environment:
      - TERM=xterm
    cap_add:
      - NET_ADMIN

  kamailio-edge:
    image: kamailio/kamailio-ci:5.4.7
    container_name: kamailio-edge
    ports:
      - "5090:5060"
    volumes:
      - ./kamailio-default/:/etc/kamailio
    environment:
      - KAM_SHM_MEM_SIZE=256
       -COREIP=172.16.254.2
       -TLSPORT=5061
       -UDPPORT=5060
       -PUBLICIP=192.168.254.2
    networks:
      external:
        ipv4_address: 192.168.254.2
      internal:
        ipv4_address: 172.16.254.2

  b2bua_internal_01:
    tty: true
    container_name: b2bua_internal_01 
    stdin_open: true
    image: andrius/pjsua:latest
    command: pjsua --null-audio --no-tcp --auto-answer=404
    ports:
      - "5091:5060"
    networks:
      internal:
        ipv4_address: 172.16.254.100

  b2bua_internal_02:
    tty: true
    container_name: b2bua_internal_02 
    stdin_open: true
    image: andrius/pjsua:latest
    command: pjsua --null-audio --no-tcp --auto-answer=200
    ports:
      - "5092:5060"
    networks:
      internal:
        ipv4_address: 172.16.254.101

  b2bua_external_01:
    tty: true
    container_name: b2bua_external_01
    stdin_open: true
    image: andrius/pjsua:latest
    command: pjsua --null-audio --no-tcp  --outbound sip:192.168.254.2;lr
    ports:
      - "5093:5060"
    networks:
      external:
        ipv4_address: 192.168.254.100

  

  b2bua_external_02:
    tty: true
    container_name: b2bua_external_02
    stdin_open: true
    image: andrius/pjsua:latest
    command: pjsua --null-audio --no-tcp --auto-answer=200
    networks:
      external:
        ipv4_address: 192.168.254.101

  opensearch-node1:
      image: opensearchproject/opensearch:latest
      container_name: opensearch-node1
      environment:
        - cluster.name=opensearch-cluster
        - node.name=opensearch-node1
        - discovery.seed_hosts=opensearch-node1,opensearch-node2
        - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
        - bootstrap.memory_lock=true  # along with the memlock settings below, disables swapping
        - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m  # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
        - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}    # Sets the demo admin user password when using demo configuration, required for OpenSearch 2.12 and higher
      ulimits:
        memlock:
          soft: -1
          hard: -1
        nofile:
          soft: 65536  # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
          hard: 65536
      volumes:
        - opensearch-data1:/usr/share/opensearch/data
      ports:
        - 9200:9200
        - 9600:9600  # required for Performance Analyzer
      healthcheck:
        test: ["CMD-SHELL", "curl -s -k -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://localhost:9200/_cluster/health | grep -q '\"status\"'"]
        interval: 20s
        timeout: 10s
        retries: 10
        start_period: 30s
      networks:
        - opensearch-net
  opensearch-node2:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node2
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - opensearch-net
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - '5601'
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch-node1:9200","https://opensearch-node2:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    depends_on:
      opensearch-node1:
        condition: service_healthy
      opensearch-node2:
        condition: service_healthy
    networks:
      - opensearch-net
 
 
  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: fluent-bit
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    environment:
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    depends_on:
      opensearch-node1:
        condition: service_healthy
    networks:
      - opensearch-net


      
volumes:
  opensearch-data1:
  opensearch-data2:

# networks:
#   opensearch-net:



networks:
    external:
        # use the bridge driver, but enable IPv6
        ipam:
            config:
                - subnet: 192.168.254.0/24
                  gateway: 192.168.254.1
    internal:
        # use a custom driver, with no options
        ipam:
            config:
                - subnet: 172.16.254.0/24
                  gateway: 172.16.254.1
    opensearch-net:




  